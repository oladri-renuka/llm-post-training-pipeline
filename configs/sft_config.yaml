model:
  name: "meta-llama/Llama-3.2-1B-Instruct"
  torch_dtype: "bfloat16"
  attn_implementation: "eager"

lora:
  r: 16
  lora_alpha: 32
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

data:
  dataset_name: "tatsu-lab/alpaca"
  max_length: 512
  train_split: "train"
  num_proc: 4

training:
  output_dir: "checkpoints/sft"
  num_train_epochs: 1
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  fp16: false
  bf16: true
  logging_steps: 10
  save_steps: 200
  save_total_limit: 2
  dataloader_num_workers: 2
  seed: 42
  report_to: "wandb"

wandb:
  project: "llm-post-training-pipeline"
  entity: "renukareddy-oladri500"
  run_name: "sft-llama3.2-1b-alpaca"
  tags:
    - "sft"
    - "lora"
    - "llama3.2"
