model:
  backbone: "distilbert-base-uncased"
  dropout: 0.1

data:
  dataset_name: "openbmb/UltraFeedback"
  max_length: 512
  num_samples: 5000
  num_proc: 4
  train_val_split: 0.95

training:
  output_dir: "checkpoints/reward"
  num_train_epochs: 3
  per_device_train_batch_size: 16
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-5
  lr_scheduler_type: "linear"
  warmup_ratio: 0.06
  weight_decay: 0.01
  fp16: false
  bf16: true
  logging_steps: 10
  save_steps: 100
  save_total_limit: 2
  eval_strategy: "steps"
  eval_steps: 100
  load_best_model_at_end: true
  metric_for_best_model: "eval_accuracy"
  seed: 42
  report_to: "wandb"

wandb:
  project: "llm-post-training-pipeline"
  entity: "renukareddy-oladri500"
  run_name: "reward-distilbert-ultrafeedback"
  tags:
    - "reward_model"
    - "bradley_terry"
    - "distilbert"
